services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: todo_voodoo
      DB_USER: todo_user
      DB_PASSWORD: todo_password
    restart: "no"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: todo_voodoo
      POSTGRES_USER: todo_user
      POSTGRES_PASSWORD: todo_password
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo_user -d todo_voodoo"]
      interval: 5s
      timeout: 5s
      retries: 10
